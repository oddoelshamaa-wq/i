<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELSHAMAA AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- عناصر للخداع البصري في الخلفية -->
    <div class="background-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="logo-3d">ELSHAMAA</div>
            <span>مساعدك الذكي</span>
        </div>
        
        <div id="chat-box" class="chat-box">
            <div class="message ai-message">أهلاً بك في عالم **Elshamaa**! كيف يمكنني إبهارك اليوم؟</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="اسأل Elshamaa..." autocomplete="off">
            <button id="search-btn">إرسال</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
