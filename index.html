<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمود الشماع | تجربة 3D فائقة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-neon: #00f2fe;
            --secondary-neon: #7000ff;
            --gpt-green: #10a37f;
            --bg-color: #030303;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px; /* عمق بصري هائل */
        }

        /* --- 1. الأشكال الثلاثية الأبعاد في الخلفية (خاطفة للأنظار) --- */
        .background-3d {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }

        .shape {
            position: absolute;
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            filter: blur(50px);
            border-radius: 50%;
            opacity: 0.4;
            animation: float 15s infinite alternate ease-in-out;
        }

        .shape-1 { width: 300px; height: 300px; top: -100px; left: -100px; animation-delay: 0s; }
        .shape-2 { width: 400px; height: 400px; bottom: -150px; right: -150px; animation-delay: -5s; }
        .shape-3 { width: 200px; height: 200px; top: 50%; left: 50%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(100px, 100px) scale(1.3) rotate(360deg); }
        }

        /* --- 2. حاوية الشات الطائرة (3D Floating Card) --- */
        .chat-card {
            width: 95%; max-width: 1100px; height: 85vh;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            box-shadow: 0 0 100px rgba(0, 242, 254, 0.1), 0 50px 100px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            position: relative;
        }

        /* Sidebar الجانبي */
        .sidebar {
            width: 280px; background: rgba(0, 0, 0, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0 40px 40px 0;
            padding: 30px; display: flex; flex-direction: column;
            transform: translateZ(50px);
        }

        .new-chat-btn {
            background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
            padding: 15px; border-radius: 15px; border: none; color: white;
            font-weight: bold; cursor: pointer; text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
        }

        /* منطقة الدردشة الرئيسية */
        .chat-main {
            flex: 1; display: flex; flex-direction: column; padding: 20px;
            transform: translateZ(80px); /* يبرز النص للأمام */
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            scroll-behavior: smooth;
        }

        /* رسائل عائمة 3D */
        .msg {
            margin-bottom: 30px; display: flex; gap: 20px;
            transform-style: preserve-3d;
        }

        .avatar {
            width: 45px; height: 45px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transform: translateZ(20px);
        }
        .bot-avatar { background: var(--gpt-green); border: 2px solid var(--primary-neon); }
        .user-avatar { background: var(--secondary-neon); }

        .bubble {
            background: rgba(255, 255, 255, 0.06);
            padding: 20px; border-radius: 25px;
            max-width: 85%; line-height: 1.8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 10px 10px 30px rgba(0,0,0,0.2);
            font-size: 1.05rem;
        }

        .bubble b { color: var(--primary-neon); }

        /* صندوق الإدخال الفضائي */
        .input-area {
            padding: 20px; display: flex; justify-content: center;
        }

        .input-pill {
            width: 90%; background: rgba(255, 255, 255, 0.1);
            border-radius: 30px; padding: 10px 25px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid var(--primary-neon);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            transform: translateZ(100px); /* يجعله أقرب شيء لعين المستخدم */
        }

        input {
            flex: 1; background: transparent; border: none; color: white;
            outline: none; font-size: 1.1rem;
        }

        .send-btn {
            background: white; color: black; width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .send-btn:hover { background: var(--primary-neon); transform: scale(1.1) rotate(-10deg); }

        /* التجاوب مع الموبايل */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            body { perspective: none; } /* إغلاق الـ 3D الثقيل في الموبايل للأداء */
            .chat-card { height: 95vh; border-radius: 20px; transform: none !important; }
        }
    </style>
</head>
<body>

    <!-- أشكال 3D تسبح في الخلفية -->
    <div class="background-3d">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- الكارت الرئيسي ثلاثي الأبعاد -->
    <div class="chat-card" id="card3d">
        <!-- القائمة الجانبية الفخمة -->
        <div class="sidebar">
            <button class="new-chat-btn" onclick="location.reload()">+ محادثة جديدة</button>
            <div style="margin-top: 40px; color: #888;">
                <p style="font-size: 0.9rem; margin-bottom: 20px;"><i class="fa-regular fa-message"></i> أذكار محمود الشماع</p>
                <p style="font-size: 0.9rem; margin-bottom: 20px;"><i class="fa-solid fa-code"></i> تعليم البرمجة 3D</p>
            </div>
            <div style="margin-top: auto; color: var(--primary-neon); font-size: 0.8rem; text-align: center;">
                Mahmoud Shammaa GPT 3.5<br>Premium 3D Experience
            </div>
        </div>

        <!-- منطقة الدردشة -->
        <div class="chat-main">
            <div style="text-align: center; color: var(--primary-neon); font-weight: bold; margin-bottom: 10px; font-size: 1.2rem;">
                ChatGPT <i class="fa-solid fa-bolt"></i>
            </div>

            <div id="chat-window">
                <div class="msg">
                    <div class="avatar bot-avatar">MS</div>
                    <div class="bubble">مرحباً بك في النسخة الفائقة من <b>محمود الشماع GPT</b>. لقد تم تفعيل محرك الـ 3D البصري لتجربة لا مثيل لها. <br><br> اسألني عن أي شيء (دين، برمجة، علوم) وسأرد عليك بأسلوب GPT-3.5 المطور.</div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-pill">
                    <i class="fa-solid fa-wand-magic-sparkles" style="color: var(--primary-neon);"></i>
                    <input type="text" id="user-input" placeholder="هل أنت جاهز للإبحار في المعرفة؟..." onkeypress="if(event.key==='Enter') send()">
                    <div class="send-btn" onclick="send()"><i class="fa-solid fa-arrow-up"></i></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card3d');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        // --- ميكانيكا الـ 3D Tilt (خطف الأنظار عند تحريك الماوس) ---
        if (window.innerWidth > 900) {
            document.addEventListener('mousemove', (e) => {
                let xAxis = (window.innerWidth / 2 - e.pageX) / 30;
                let yAxis = (window.innerHeight / 2 - e.pageY) / 30;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            // إعادة الكارت لوضعه الطبيعي عند خروج الماوس
            document.addEventListener('mouseleave', () => {
                card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            });
        }

        function send() {
            const val = userInput.value.trim();
            if (!val) return;

            appendMsg(val, 'user');
            userInput.value = "";

            setTimeout(() => {
                const reply = getGPT35Reply(val);
                appendMsg(reply, 'bot');
            }, 800);
        }

        function appendMsg(text, sender) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `
                <div class="avatar ${sender === 'user' ? 'user-avatar' : 'bot-avatar'}">${sender === 'user' ? 'U' : 'MS'}</div>
                <div class="bubble">${text}</div>
            `;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // --- محرك ردود GPT-3.5 (رد على كل شيء) ---
        function getGPT35Reply(input) {
            const t = input.toLowerCase();

            if (t.includes("أذكار") || t.includes("اذكار")) {
                return `بكل سرور، بصفتي <b>محمود الشماع</b>، إليك فضل الأذكار بأسلوب مفصل:<br><br>
                1. <b>السكينة:</b> ذكر الله يطرد القلق، قال تعالى: {ألا بذكر الله تطمئن القلوب}.<br>
                2. <b>الأذكار المستحبة:</b> أنصحك بـ "سبحان الله وبحمده" مئة مرة.<br><br>
                هل تود قائمة كاملة بأذكار الصباح والمساء؟`;
            }

            if (t.includes("برمجة") || t.includes("كود")) {
                return `البرمجة هي لغة بناء المستحيل. الموقع الذي تتفاعل معه الآن تم بناؤه باستخدام:<br><br>
                - <b>CSS 3D Transform:</b> لهذا التأثير الحركي المذهل.<br>
                - <b>JS Logic:</b> لمعالجة ردودي لك.<br><br>
                هل تريدني أن أشرح لك كود الـ Tilt 3D الذي يحرك هذه الشاشة؟`;
            }

            if (t.includes("من أنت") || t.includes("من انت")) {
                return `أنا <b>محمود الشماع</b>، المساعد الذكي الذي يجمع بين قوة الذكاء الاصطناعي وجمال التصميم ثلاثي الأبعاد. هدفي هو تزويدك بالمعلومات الأكثر دقة بأكثر الطرق إبهاراً.`;
            }

            // الرد الشامل لأي سؤال آخر بأسلوب GPT 3.5
            return `تحية طيبة. بخصوص تساؤلك عن "<b>${input}</b>"، إليك تحليلي كـ محمود الشماع:<br><br>
            من الناحية الجوهرية، هذا الموضوع يتطلب نظرة عميقة وشاملة. يمكننا النظر إليه من عدة زوايا:<br>
            - <b>الزاوية الأولى:</b> الأهمية العملية في حياتنا اليومية.<br>
            - <b>الزاوية الثانية:</b> كيف يمكننا تطوير هذا المفهوم مستقبلاً؟<br><br>
            أنا هنا لمواصلة الحوار معك وتزويدك بأي تفاصيل إضافية قد تحتاجها. كيف تود أن نبدأ؟`;
        }
    </script>
</body>
</html>
