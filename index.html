<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محمود الشماع | Smart GPT 3.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020b1a;
            --cyan: #00f2fe;
            --purple: #7000ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at center, #0a192f 0%, #020b1a 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; perspective: 1000px;
        }

        /* تأثير الخلفية المتحركة */
        .bg-glow {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: repeating-conic-gradient(from 0deg, #020b1a 0deg 20deg, #051630 20deg 40deg);
            opacity: 0.3; animation: rotateBg 40s linear infinite;
        }
        @keyframes rotateBg { from { transform: rotate(0deg) scale(1.5); } to { transform: rotate(360deg) scale(1.5); } }

        /* حاوية الشات 3D */
        .chat-card {
            width: 95%; max-width: 500px; height: 92vh;
            background: rgba(10, 25, 47, 0.75); backdrop-filter: blur(20px);
            border-radius: 40px; border: 1.5px solid rgba(0, 242, 254, 0.3);
            display: flex; flex-direction: column; transform-style: preserve-3d;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .header {
            padding: 20px; text-align: center; color: var(--cyan);
            font-size: 1.4rem; font-weight: bold; border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            text-shadow: 0 0 10px var(--cyan);
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .msg { display: flex; gap: 12px; width: 100%; animation: fadeIn 0.4s ease; }
        .bot-msg { flex-direction: row; }
        .user-msg { flex-direction: row-reverse; }

        .avatar {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; flex-shrink: 0; font-size: 0.9rem;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }
        .bot-avatar { background: var(--cyan); color: #000; }
        .user-avatar { background: var(--purple); color: #fff; }

        .bubble {
            background: var(--glass); padding: 15px; border-radius: 20px;
            border: 1px solid rgba(0, 242, 254, 0.2); max-width: 80%;
            color: #fff; line-height: 1.6; font-size: 1rem;
        }
        .bubble b { color: var(--cyan); }

        /* صندوق الإدخال */
        .input-box { padding: 20px; }
        .pill {
            background: rgba(255,255,255,0.05); border: 1.5px solid var(--cyan);
            border-radius: 50px; padding: 8px 15px; display: flex; align-items: center; gap: 10px;
        }
        input {
            flex: 1; background: transparent; border: none; color: white;
            outline: none; font-size: 1rem; text-align: right; padding: 10px;
        }
        .send-btn {
            background: #fff; color: #000; width: 38px; height: 38px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .send-btn:hover { background: var(--cyan); transform: scale(1.1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 600px) { .chat-card { width: 100%; height: 100vh; border-radius: 0; } }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="chat-card" id="card">
        <div class="header">ChatGPT <i class="fa-solid fa-bolt"></i></div>
        <div id="chat-window">
            <div class="msg bot-msg">
                <div class="avatar bot-avatar">MS</div>
                <div class="bubble">مرحباً بك! أنا <b>محمود الشماع</b>. لقد تم تحديث ذكائي ليفهمك حتى لو أخطأت في الكتابة. اسألني عن أي شيء وسأجيبك فوراً!</div>
            </div>
        </div>
        <div class="input-box">
            <div class="pill">
                <i class="fa-solid fa-magic-wand-sparkles" style="color: var(--cyan);"></i>
                <input type="text" id="user-input" placeholder="اسألني أي سؤال ثقافي أو علمي..." onkeypress="if(event.key==='Enter') send()">
                <div class="send-btn" onclick="send()"><i class="fa-solid fa-arrow-up"></i></div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        // تأثير 3D خفيف
        document.addEventListener('mousemove', (e) => {
            if(window.innerWidth > 1024) {
                let x = (window.innerWidth / 2 - e.pageX) / 50;
                let y = (window.innerHeight / 2 - e.pageY) / 50;
                card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            }
        });

        // دالة تنظيف النص (لفهم الكلام حتى لو مكتوب غلط)
        function normalize(text) {
            return text.toLowerCase()
                .replace(/[أإآ]/g, 'ا')
                .replace(/ة/g, 'ه')
                .replace(/ى/g, 'ي')
                .replace(/[\u064B-\u0652]/g, "") // إزالة التشكيل
                .trim();
        }

        function send() {
            const val = userInput.value.trim();
            if(!val) return;
            appendMsg(val, 'user');
            userInput.value = "";
            setTimeout(() => { appendMsg(getAIResponse(val), 'bot'); }, 600);
        }

        function appendMsg(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}-msg`;
            div.innerHTML = `<div class="avatar ${sender}-avatar">${sender==='user'?'U':'MS'}</div><div class="bubble">${text}</div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function getAIResponse(input) {
            const s = normalize(input);

            // --- إجابات الصور الجديدة (مع خاصية الفهم الذكي) ---
            if (s.includes("اطول سوره")) return "<b>الإجابة: سورة البقرة.</b> وهي أطول سورة في القرآن الكريم وتضم 286 آية.";
            if (s.includes("مخترع المصباح") || s.includes("اديسون")) return "<b>الإجابة: توماس إديسون.</b> هو العالم الذي أضاء العالم باختراعه للمصباح الكهربائي المتوهج.";
            if (s.includes("اضخم حيوان") || s.includes("الحوت الازرق")) return "<b>الإجابة: الحوت الأزرق.</b> يُعتبر أضخم كائن حي عاش على وجه الأرض، حيث يصل طوله لأكثر من 30 متراً.";
            if (s.includes("صعد الى الفضاء") || s.includes("غاغارين")) return "<b>الإجابة: يوري غاغارين.</b> رائد فضاء سوفيتي كان أول إنسان يخرج إلى الفضاء الخارجي عام 1961.";
            if (s.includes("ارض الاهرامات") || s.includes("مصر")) return "<b>الإجابة: جمهورية مصر العربية.</b> تشتهر بوجود أهرامات الجيزة التي تعد من عجائب الدنيا السبع.";
            if (s.includes("روايه البؤساء") || s.includes("فيكتور هوغو")) return "<b>الإجابة: فيكتور هوغو.</b> هو الأديب الفرنسي الشهير الذي كتب هذه الرواية الملحمية.";
            if (s.includes("اطول برج") || s.includes("خليفه")) return "<b>الإجابة: برج خليفة في دبي.</b> يبلغ ارتفاعه 828 متراً وهو أطول بناء شيده الإنسان.";
            if (s.includes("الفاروق") || s.includes("عمر بن الخطاب")) return "<b>الإجابة: الصحابي عمر بن الخطاب رضي الله عنه.</b> لُقب بالفاروق لأنه فرق بين الحق والباطل.";
            if (s.includes("يفصل بين قاره اوروبا وافريقيا") || s.includes("البحر المتوسط")) return "<b>الإجابة: البحر الأبيض المتوسط.</b> هو البحر الذي يربط القارات الثلاث القديمة.";
            if (s.includes("عمله قطر") || s.includes("ريال قطري")) return "<b>الإجابة: الريال القطري.</b> هو العملة الرسمية المتداولة في دولة قطر.";
            if (s.includes("النبي الذي ابتلعه الحوت") || s.includes("يونس")) return "<b>الإجابة: النبي يونس عليه السلام.</b> مكث في بطن الحوت وكان يسبح الله حتى أخرجه الله.";

            // --- إجابات الصور السابقة ---
            if (s.includes("الكوكب الاحمر") || s.includes("المريخ")) return "<b>ج: كوكب المريخ.</b>";
            if (s.includes("اطول نهر") || s.includes("النيل")) return "<b>ج: نهر النيل.</b>";
            if (s.includes("يضخ الدم") || s.includes("القلب")) return "<b>ج: القلب.</b>";
            if (s.includes("اكبر قاره") || s.includes("اسيا")) return "<b>ج: قارة آسيا.</b>";
            if (s.includes("غاز") && s.includes("وفره")) return "<b>ج: النيتروجين.</b>";
            if (s.includes("سفينه الصحراء") || s.includes("جمل")) return "<b>ج: الجمل.</b>";
            if (s.includes("يمشي بلا قدمين") || s.includes("سحاب")) return "<b>ج: السحاب/الغيوم.</b>";
            if (s.includes("ملك الغابه") || s.includes("اسد")) return "<b>ج: الأسد.</b>";
            if (s.includes("قلب القران") || s.includes("يس")) return "<b>ج: سورة يس.</b>";

            // رد افتراضي ذكي
            return `بصفتي <b>محمود الشماع</b>، أجد سؤالك بخصوص "<b>${input}</b>" ذكياً جداً. هل تود أن أعطيك تفاصيل أكثر حول هذا الموضوع من وجهة نظر تقنية أو ثقافية؟`;
        }
    </script>
</body>
</html>
