<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محمود الشماع | Smart GPT 3.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020b1a;
            --cyan: #00f2fe;
            --purple: #7000ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at center, #0a192f 0%, #020b1a 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden;
        }

        .chat-card {
            width: 95%; max-width: 500px; height: 92vh;
            background: rgba(10, 25, 47, 0.75); backdrop-filter: blur(20px);
            border-radius: 40px; border: 1.5px solid rgba(0, 242, 254, 0.3);
            display: flex; flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .header {
            padding: 20px; text-align: center; color: var(--cyan);
            font-size: 1.4rem; font-weight: bold; border-bottom: 1px solid rgba(0, 242, 254, 0.2);
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .msg { display: flex; gap: 12px; width: 100%; animation: fadeIn 0.4s ease; }
        .bot-msg { flex-direction: row; }
        .user-msg { flex-direction: row-reverse; }

        .avatar {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; flex-shrink: 0;
        }
        .bot-avatar { background: var(--cyan); color: #000; }
        .user-avatar { background: var(--purple); color: #fff; }

        .bubble {
            background: var(--glass); padding: 15px; border-radius: 20px;
            border: 1px solid rgba(0, 242, 254, 0.2); max-width: 80%;
            color: #fff; line-height: 1.6;
        }
        .bubble b { color: var(--cyan); }

        .input-box { padding: 20px; }
        .pill {
            background: rgba(255,255,255,0.05); border: 1.5px solid var(--cyan);
            border-radius: 50px; padding: 8px 15px; display: flex; align-items: center; gap: 10px;
        }
        input {
            flex: 1; background: transparent; border: none; color: white;
            outline: none; font-size: 1rem; text-align: right;
        }
        .send-btn {
            background: #fff; color: #000; width: 38px; height: 38px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="chat-card">
        <div class="header">ChatGPT <i class="fa-solid fa-bolt"></i></div>
        <div id="chat-window">
            <div class="msg bot-msg">
                <div class="avatar bot-avatar">MS</div>
                <div class="bubble">أهلاً بك! أنا <b>محمود الشماع</b>. لقد قمت بتحسين ذكائي الآن ليفهم حتى الأخطاء الإملائية مثل (صوره بدل سورة). اسألني!</div>
            </div>
        </div>
        <div class="input-box">
            <div class="pill">
                <i class="fa-solid fa-magic-wand-sparkles" style="color: var(--cyan);"></i>
                <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') send()">
                <div class="send-btn" onclick="send()"><i class="fa-solid fa-arrow-up"></i></div>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        // قاعدة البيانات الموسعة
        const knowledgeBase = [
            // القرآن والسور
            { keys: ["سورة", "سوره", "قران", "البقره", "البقرة", "السوره", "السورة"], ans: "أطول سورة في القرآن الكريم هي <b>سورة البقرة</b> وعدد آياتها 286 آية.", label: "أطول سورة" },
            { keys: ["اقصر", "اصغر", "اقل"], ans: "أقصر سورة في القرآن الكريم هي <b>سورة الكوثر</b>.", label: "أقصر سورة" },
            { keys: ["الحديد", "حديد"], ans: "سورة الحديد عدد آياتها 29 آية.", label: "سورة الحديد" },
            
            // العلماء والمخترعون
            { keys: ["اديسون", "المصباح", "مخترع", "مصباح", "الكم"], ans: "مخترع المصباح الكهربائي هو العالم <b>توماس إديسون</b>.", label: "مخترع المصباح" },
            { keys: ["اينشتاين", "النسبية", "الذرة"], ans: "أبو النسبية هو العالم <b>ألبرت أينشتاين</b>.", label: "أينشتاين" },
            { keys: ["نيوتن", "الجاذبية", "الثقل"], ans: "اكتشف قانون الجاذبية العالم <b>إسحاق نيوتن</b>.", label: "نيوتن" },
            { keys: ["ابن سينا", "الطب", "طبيب"], ans: "أبو الطب الحديث هو <b>ابن سينا</b> في كتابه القانون.", label: "ابن سينا" },
            { keys: [" الخوارزمي", "الرياضيات", "حساب", "الجبر"], ans: "أبو الجبر هو <b>الخوارزمي</b>.", label: "الخوارزمي" },
            
            // الفضاء والكواكب
            { keys: ["المريخ", "الكوكب الاحمر", "المريخ", "المرخ"], ans: "الكوكب الأحمر هو كوكب <b>المريخ</b>.", label: "الكوكب الأحمر" },
            { keys: ["الارض", "الأرض", "ارض"], ans: "كوكب <b>الأرض</b> هو ثالث كواكب المجموعة الشمسية.", label: "كوكب الأرض" },
            { keys: ["الشمس", "نجم"], ans: "<b>الشمس</b> هو نجم في مركز المجموعة الشمسية.", label: "الشمس" },
            { keys: ["القمر", "قمر"], ans: "<b>القمر</b> هو قمر الأرض الوحيد.", label: "القمر" },
            
            // الأنهار والبلدان
            { keys: ["النيل", "اطول نهر", "افisman"], ans: "أطول نهر في العالم هو <b>نهر النيل</b>.", label: "أطول نهر" },
            { keys: ["amazon", "امازون"], ans: "أطول نهر في أمريكا الجنوبية هو <b>الأمازون</b>.", label: "نهر الأمازون" },
            { keys: ["مصر", "اهرام", "اهرام"], ans: "عاصمة مصر هي <b>القاهرة</b> وأشهر معالمها الأهرامات.", label: "مصر" },
            { keys: ["السعودية", "مكه", "مكة"], ans: "عاصمة السعودية هي <b>الرياض</b> وأقدس مدنها مكة المكرمة.", label: "السعودية" },
            
            // الحيوانات
            { keys: ["اطول", "اكبر", "اضخم", "حيوان"], ans: "أكبر حيوان على الأرض هو <b>الحوت الأزرق</b>.", label: "أكبر حيوان" },
            { keys: ["سريع", "اسرع", "سرعة"], ans: "أسرع حيوان هو <b>الفهد</b>.", label: "أسرع حيوان" },
            
            // معلومات عامة
            { keys: ["عدد", "البلدان", "دول"], ans: "عدد دول العالم المعترف بها هو <b>195 دولة</b>.", label: "عدد الدول" },
            { keys: ["المحيط", "اكبر", "ماء"], ans: "أكبر محيط هو <b>المحيط الهادئ</b>.", label: "أكبر محيط" },
            { keys: ["الجبال", "اطول جبل", "اورست"], ans: "أعلى جبل في العالم هو <b>جبل إيفرست</b> بارتفاع 8848 متر.", label: "أعلى جبل" }
        ];

        // دالة التنظيف العميق (Deep Normalize)
        // تقوم بتبديل الحروف المتشابهة لتسهيل المقارنة
        function deepNormalize(text) {
            return text.toLowerCase()
                // توحيد الحروف المتشابهة
                .replace(/[أإآ]/g, 'ا')       // الألف المقصورة والهمزة
                .replace(/ة/g, 'ه')           // التاء المربوطة -> هاء
                .replace(/ى/g, 'ي')           // الياء المقصورة
                .replace(/ص/g, 'س')           // الصاد -> سين
                .replace(/ط/g, 'ت')           // الطاء -> تاء
                .replace(/ظ/g, 'ز')           // الظاء -> زاي
                .replace(/ض/g, 'د')           // الضاد -> دال
                .replace(/ق/g, 'ك')           // القاف -> كاف
                .replace(/ف/g, 'ب')           // الفاء -> باء (بعض الكتابات)
                .replace(/غ/g, 'ع')           // الغين -> عين
                .replace(/ؤ/g, 'ا')           // الهمزة المتوسطة
                .replace(/ئ/g, 'ي')           // الهمزة المتطرفة
                // إزالة التشكيل
                .replace(/[\u064B-\u0652]/g, "")
                // إزالة المسافات الزائدة
                .replace(/\s+/g, ' ')
                .trim();
        }

        // قاموس التصحيح الإملائي الشائع
        const commonCorrections = {
            "سوره": "سورة",
            "صوره": "سورة",
            "سره": "سورة",
            "صور": "سورة",
            "القران": "القرآن",
            "قرآن": "قرآن",
            "الاديسون": "إديسون",
            "اديسون": "إديسون",
            "المريخ": "المريخ",
            "المرخ": "المريخ",
            "نيوتن": "نيوتن",
            "اينشتاين": "أينشتاين",
            "ابن سينا": "ابن سينا",
            "الخوارزمي": "الخوارزمي",
            "النيل": "النيل",
            "الامازون": "الأمازون",
            "امازون": "أمازون",
            "الفهد": "الفهد",
            "الحوت": "الحوت",
            "اورست": "إيفرست",
            "افريتا": "إيفرست"
        };

        // دالة تصحيح الأخطاء الإملائية
        function correctSpelling(text) {
            let corrected = text;
            for (const [wrong, right] of Object.entries(commonCorrections)) {
                const regex = new RegExp(wrong, 'gi');
                corrected = corrected.replace(regex, right);
            }
            return corrected;
        }

        function send() {
            const val = userInput.value.trim();
            if(!val) return;
            appendMsg(val, 'user');
            userInput.value = "";
            
            setTimeout(() => {
                const response = getSmartResponse(val);
                appendMsg(response, 'bot');
            }, 600);
        }

        function appendMsg(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}-msg`;
            div.innerHTML = `<div class="avatar ${sender}-avatar">${sender==='user'?'U':'MS'}</div><div class="bubble">${text}</div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function getSmartResponse(input) {
            // تصحيح الأخطاء الإملائية أولاً
            const correctedInput = correctSpelling(input);
            
            const normalizedInput = deepNormalize(correctedInput);
            
            // 1. البحث عن الكلمات المفتاحية بعد التنظيف العميق
            for (const item of knowledgeBase) {
                for (const key of item.keys) {
                    const normKey = deepNormalize(key);
                    if (normalizedInput.includes(normKey)) {
                        // إذا كان هناك تصحيح، نخبر المستخدم
                        if (correctedInput !== input) {
                            return `اقصدت: "${correctedInput}"؟ ${item.ans}`;
                        }
                        return item.ans;
                    }
                }
            }

            // 2. إذا لم يجد تطابقاً تاماً، يبحث عن "أطول" و "سورة" حتى لو مكتوبة غلط
            if (normalizedInput.includes("اطول") && (normalizedInput.includes("سوره") || normalizedInput.includes("سره") || normalizedInput.includes("سور") || normalizedInput.includes("صور"))) {
                return "تقصد أطول سورة في القرآن؟ الإجابة هي <b>سورة البقرة</b>.";
            }

            // 3. محاولة البحث بدون تصحيح إذا فشل مع التصحيح
            const rawNormalized = deepNormalize(input);
            for (const item of knowledgeBase) {
                for (const key of item.keys) {
                    const normKey = deepNormalize(key);
                    if (rawNormalized.includes(normKey)) {
                        return item.ans;
                    }
                }
            }

            return `بصفتي <b>محمود الشماع</b>، لم أفهم تماماً ما تقصده "${input}". اسألني عن القرآن، العلوم، التاريخ، أو الجغرافيا!`;
        }
    </script>
</body>
</html>
