<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محمود الشماع | تجربة ChatGPT 3.5 الفائقة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* إعدادات الألوان المتطابقة مع صورتك */
        :root {
            --bg-deep: #020b1a; /* لون الخلفية الغامق */
            --accent-cyan: #00f2fe; /* لون النيون الأزرق */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --bubble-border: rgba(0, 242, 254, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at center, #0a192f 0%, #020b1a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            perspective: 1200px; /* العمق الثلاثي الأبعاد */
        }

        /* أشكال ضوئية تسبح في الخلفية للخداع البصري */
        .glow-sphere {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.1) 0%, transparent 70%);
            border-radius: 50%; z-index: -1; animation: floatBg 20s infinite alternate;
        }
        @keyframes floatBg { from { transform: translate(-50%, -50%); } to { transform: translate(50%, 50%); } }

        /* حاوية الشات الرئيسية 3D */
        .chat-card {
            width: 95%; max-width: 500px; height: 90vh;
            background: rgba(10, 25, 47, 0.6);
            backdrop-filter: blur(25px);
            border-radius: 35px;
            border: 1px solid var(--bubble-border);
            display: flex; flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
            position: relative;
        }

        /* الهيدر العلوي */
        .header {
            padding: 25px; text-align: center; color: var(--accent-cyan);
            font-size: 1.5rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* منطقة الرسائل */
        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* شكل الرسالة كما في صورتك */
        .msg-row { display: flex; gap: 15px; width: 100%; align-items: flex-start; }
        .bot-row { flex-direction: row; } /* البوت على اليمين في RTL */
        .user-row { flex-direction: row-reverse; }

        .avatar {
            width: 42px; height: 42px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: white; flex-shrink: 0;
            box-shadow: 0 0 15px var(--accent-cyan);
        }
        .bot-avatar { background: var(--accent-cyan); color: #000; }
        .user-avatar { background: #5436da; }

        .bubble {
            background: var(--glass-bg);
            padding: 20px; border-radius: 20px;
            border: 1px solid var(--bubble-border);
            max-width: 80%; line-height: 1.8; color: #fff;
            font-size: 1.05rem; box-shadow: 10px 10px 20px rgba(0,0,0,0.2);
        }
        .bubble b { color: var(--accent-cyan); text-shadow: 0 0 10px var(--accent-cyan); }

        /* صندوق الإدخال البيضاوي (مطابق للصورة) */
        .input-container { padding: 25px; }
        .input-pill {
            background: rgba(255,255,255,0.03);
            border: 1.5px solid var(--accent-cyan);
            border-radius: 50px; padding: 8px 15px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
        }

        input {
            flex: 1; background: transparent; border: none; color: white;
            outline: none; font-size: 1rem; padding: 10px; text-align: right;
        }

        .icon-action { color: var(--accent-cyan); font-size: 1.3rem; cursor: pointer; transition: 0.3s; }
        .icon-action:hover { transform: scale(1.2); }

        .send-btn {
            background: white; color: black; width: 35px; height: 35px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* تحريك الواجهة 3D حسب حركة الجهاز أو الماوس */
        @media (min-width: 1024px) {
            .chat-card { transition: transform 0.1s ease-out; }
        }

        /* التجاوب مع الموبايل */
        @media (max-width: 600px) {
            .chat-card { width: 100%; height: 100vh; border-radius: 0; border: none; }
            .bubble { font-size: 0.95rem; }
        }

        /* سكرول بار مخفي */
        #chat-window::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="glow-sphere" style="top: 20%; left: 10%;"></div>
    <div class="glow-sphere" style="bottom: 10%; right: 10%;"></div>

    <div class="chat-card" id="main-card">
        <div class="header">
            <i class="fa-solid fa-bolt"></i> ChatGPT
        </div>

        <div id="chat-window">
            <div class="msg-row bot-row">
                <div class="avatar bot-avatar">MS</div>
                <div class="bubble">
                    مرحباً بك في النسخة الفائقة من <b>محمود الشماع GPT</b>. لقد تم تفعيل محرك الـ 3D البصري لتجربة لا مثيل لها.
                    <br><br>
                    اسألني عن أي شيء (دين، برمجة، علوم) وسأرد عليك بأسلوب GPT-3.5 المطور.
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-pill">
                <i class="fa-solid fa-wand-magic-sparkles icon-action"></i>
                <input type="text" id="user-input" placeholder="هل أنت جاهز للإبحار في المعرفة؟" onkeypress="if(event.key==='Enter') send()">
                <div class="send-btn" onclick="send()">
                    <i class="fa-solid fa-arrow-up"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('main-card');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        // --- تأثير الـ 3D التفاعلي ---
        if (window.innerWidth > 1024) {
            document.addEventListener('mousemove', (e) => {
                let x = (window.innerWidth / 2 - e.pageX) / 40;
                let y = (window.innerHeight / 2 - e.pageY) / 40;
                card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            });
        }

        function send() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMsg(text, 'user');
            userInput.value = "";

            // محاكاة رد محمود الشماع GPT-3.5
            setTimeout(() => {
                const reply = generateAIResponse(text);
                appendMsg(reply, 'bot');
            }, 800);
        }

        function appendMsg(text, sender) {
            const row = document.createElement('div');
            row.className = `msg-row ${sender}-row`;
            row.innerHTML = `
                <div class="avatar ${sender === 'user' ? 'user-avatar' : 'bot-avatar'}">
                    ${sender === 'user' ? 'U' : 'MS'}
                </div>
                <div class="bubble">${text}</div>
            `;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function generateAIResponse(input) {
            const t = input.toLowerCase();
            
            // ردود منظمة بأسلوب GPT-3.5
            if (t.includes("أذكار") || t.includes("اذكار")) {
                return `بصفتي <b>محمود الشماع</b>، يسعدني تذكيرك بفضل الأذكار:<br><br>
                1. <b>السكينة:</b> "ألا بذكر الله تطمئن القلوب".<br>
                2. <b>الحفظ:</b> آية الكرسي هي حصنك الحصين.<br><br>
                هل تريد قائمة مفصلة بأذكار الصباح والمساء؟ أنا هنا للمساعدة.`;
            }

            if (t.includes("برمجة") || t.includes("كود")) {
                return `عالم البرمجة مذهل! الموقع الذي تستخدمه الآن مبني بتقنيات الـ <b>3D CSS</b> و <b>JavaScript</b> المتطورة.<br><br>هل تريدني أن أشرح لك كيف صممت هذه الواجهة "الخاطفة للأنظار"؟`;
            }

            return `شكراً لسؤالك حول "<b>${input}</b>". <br><br>
            بصفتي محمود الشماع، المساعد الذكي، أرى أن هذا الموضوع يتطلب نظرة شاملة. هل تود أن نتناول الجوانب العلمية أم الدينية لهذا الأمر؟ أنا جاهز للنقاش بتفصيل.`;
        }
    </script>
</body>
</html>
