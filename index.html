    <style>
        :root {
            --bg-dark: #020b1a;
            --cyan: #00f2fe;
            --purple: #7000ff;
            --text-gray: #4a6a8a;
            --bg: #020b1a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background-color: var(--bg-dark);
            background: radial-gradient(circle at center, #0a192f 0%, #020b1a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* --- شاشة التحميل (Splash Screen) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        /* الدائرة المتحركة */
        .loader-ring {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-top: 4px solid var(--cyan);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin-bottom: 40px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }

        /* مجموعة الشعار */
        .brand-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        /* مربع الـ AI المتوهج */
        .ai-box {
            background: var(--cyan);
            color: #020b1a;
            padding: 5px 12px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 1.8rem;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* اسم ELSHAMAA المتدرج */
        .brand-name {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--purple), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        /* النص السفلي الصغير */
        .sub-text {
            color: var(--text-gray);
            font-size: 0.75rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: 500;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- واجهة الشات --- */
        .chat-card {
            display: none; /* مخفية حتى تختفي شاشة التحميل */
            width: 95%; max-width: 500px; height: 92vh;
            background: rgba(10, 25, 47, 0.75); backdrop-filter: blur(20px);
            border-radius: 40px; border: 1.5px solid rgba(0, 242, 254, 0.3);
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .header {
            padding: 20px; text-align: center; color: var(--cyan);
            font-size: 1.4rem; font-weight: bold; border-bottom: 1px solid rgba(0, 242, 254, 0.2);
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .msg { display: flex; gap: 12px; width: 100%; animation: fadeIn 0.4s ease; }
        .bot-msg { flex-direction: row; }
        .user-msg { flex-direction: row-reverse; }

        .avatar {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; flex-shrink: 0;
        }
        .bot-avatar { background: var(--cyan); color: #000; }
        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
        }
        .user-avatar { background: var(--purple); color: #fff; }

        .bubble {
            background: var(--glass); padding: 15px; border-radius: 20px;
            border: 1px solid rgba(0, 242, 254, 0.2); max-width: 80%;
            color: #fff; line-height: 1.6;
        }
        .bubble b { color: var(--cyan); }

        .input-box { padding: 20px; }
        .pill {
            background: rgba(255,255,255,0.05); border: 1.5px solid var(--cyan);
            border-radius: 50px; padding: 8px 15px; display: flex; align-items: center; gap: 10px;
        }
        input {
            flex: 1; background: transparent; border: none; color: white;
            outline: none; font-size: 1rem; text-align: right;
        }
        .send-btn {
            background: #fff; color: #000; width: 38px; height: 38px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* responsive adjustments */
        @media (max-width: 600px) {
            .brand-name { font-size: 2.5rem; }
            .ai-box { font-size: 1.4rem; padding: 4px 10px; }
            .sub-text { font-size: 0.65rem; letter-spacing: 4px; }
            .chat-card { width: 100%; height: 100vh; border-radius: 0; }
            .header { font-size: 1.2rem; padding: 15px; }
            #chat-window { padding: 15px; }
            .input-box { padding: 15px; }
            .pill { padding: 6px 12px; }
            input { font-size: 0.9rem; }
        }
    </style>
</head>

                .replace(/[\u064B-\u0652]/g, "")
                // إزالة المسافات الزائدة
                .replace(/\s+/g, ' ')
                .trim();
        }

        // دالة تصحيح الأخطاء الإملائية
        function correctSpelling(text) {
            if (!text) return "";
            let corrected = text;
            try {
                for (const [wrong, right] of Object.entries(commonCorrections)) {
                    const regex = new RegExp(wrong, 'gi');
                    corrected = corrected.replace(regex, right);
                }
            } catch(err) {
                console.error("خطأ في التصحيح:", err);
            }
            return corrected;
        }

        function send() {
            const val = document.getElementById('user-input').value.trim();
            if (!val) return;

            appendMsg(val, 'user'); // إظهار رسالة المستخدم
            
            // حفظ سؤال المستخدم في Firebase
            if (database) {
                database.ref('sessions/' + currentUserId + '/messages').push({
                    text: val,
                    sender: 'user',
                    timestamp: new Date().toLocaleString('ar-EG')
                }).catch(err => console.log("Error saving user message:", err));
            }
            
            // تصحيح الأخطاء الإملائية
            const correctedInput = correctSpelling(val);
            const normalizedInput = deepNormalize(correctedInput);
            
            console.log("🔍 البحث عن:", normalizedInput);
            
            // البحث عن إجابة في قاعدة البيانات الموسعة
            let foundResponse = null;
            let foundItem = null;
            
            try {
                if (!knowledgeBase || knowledgeBase.length === 0) {
                    console.error("❌ قاعدة البيانات فارغة!");
                    foundResponse = null;
                } else {
                    for (const item of knowledgeBase) {
                        if (!item.keys) continue;
                        for (const key of item.keys) {
                            const normKey = deepNormalize(key);
                            if (normalizedInput.includes(normKey)) {
                                foundResponse = item.ans;
                                foundItem = item;
                                console.log("✅ وجدت:", item.label);
                                break;
                            }
                        }
                        if (foundResponse) break;
                    }
                }
            } catch(err) {
                console.error("❌ خطأ في البحث:", err);
                foundResponse = null;
            }

            if (foundResponse) {
                // إذا وجد إجابة مبرمجة (يرد فوراً)
                let displayMsg = foundResponse;
                if (correctedInput !== val) {
                    displayMsg = `اقصدت: "<b>${correctedInput}</b>"؟ <br><br> ${foundResponse}`;
                }
                appendMsg(displayMsg, 'bot');
                
                // حفظ رد البوت في Firebase
                if (database) {
                    database.ref('sessions/' + currentUserId + '/messages').push({
                        text: displayMsg,
                        sender: 'bot',
                        timestamp: new Date().toLocaleString('ar-EG'),
                        type: 'knowledge_base'
                    }).catch(err => console.log("Error saving bot message:", err));
                }
            } else {
                // إذا لم يجد إجابة - تحقق إذا كان السؤال مطروح قبل كده
                console.log("❓ لم يجد إجابة");
                const questionExists = escalatedQuestions.some(q => 
                    deepNormalize(q) === normalizedInput
                );
                
                let botMsg = "";
                let messageType = "escalation";
                
                if (questionExists) {
                    // هذا السؤال مطروح قبل كده - الآن ننقله للمهندس
                    botMsg = "✅ <b>تم تسجيل سؤالك بنجاح!</b><br><br>سيتم تحويلك للمهندس محمود الآن";
                    messageType = "escalation_confirmed";
                } else {
                    // أول مرة بهذا السؤال
                    botMsg = "❓ سؤالك تخصصي جداً!<br><br>المهندس محمود سيرد عليك قريباً";
                    escalatedQuestions.push(normalizedInput); // تسجيل السؤال
                    messageType = "escalation_first";
                }
                
                console.log("📨 إرسال:", botMsg);
                appendMsg(botMsg, 'bot');
                
                // حفظ الرد والسؤال المرفوع في Firebase
                if (database) {
                    database.ref('sessions/' + currentUserId + '/messages').push({
                        text: botMsg,
                        sender: 'bot',
                        timestamp: new Date().toLocaleString('ar-EG'),
                        type: messageType
                    }).catch(err => console.log("Error saving escalation message:", err));
                }
            }

            document.getElementById('user-input').value = "";
        }

        function appendMsg(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}-msg`;
            let avatarHtml;
            if (sender === 'bot') {
                // use personal photo for bot
                avatarHtml = '<div class="avatar bot-avatar"><img src="2a4eacaa-60f3-4058-98dd-25e0cb764bad.jpg" alt="صورتك"></div>';
            } else {
                avatarHtml = '<div class="avatar user-avatar">U</div>';
            }
            div.innerHTML = `${avatarHtml}<div class="bubble">${text}</div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }


        </script>


    </body>
